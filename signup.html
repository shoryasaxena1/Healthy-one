<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthy-One | Join Us</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .signup-card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 350px; }
        h2 { color: #4caf50; text-align: center; margin-bottom: 20px; }
        label { font-size: 14px; color: #555; font-weight: bold; }
        input, select { width: 100%; padding: 10px; margin: 8px 0 18px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #45a049; }
        .login-link { text-align: center; margin-top: 15px; font-size: 13px; }
        .login-link a { color: #4caf50; text-decoration: none; }
    </style>
</head>
<body>

<div class="signup-card">
    <h2>Create Account</h2>
    <form action="/register" method="POST">
        <label>Username</label>
        <input type="text" name="username" placeholder="e.g. Rahul_21" required>
        
        <label>Password</label>
        <input type="password" name="password" placeholder="Create a password" required>

        <label>Age</label>
        <input type="number" name="age" placeholder="Your age" required>

        <label>Weight (kg)</label>
        <input type="number" step="0.1" name="weight" placeholder="e.g. 70.5" required>

        <label>Height (cm)</label>
        <input type="number" name="height" placeholder="e.g. 175" required>

        <label>Gender</label>
        <select name="gender" required>
            <option value="male">Male</option>
            <option value="female">Female</option>
        </select>

        <button type="submit">Calculate & Register</button>
    </form>
    <div class="login-link">
        Already have an account? <a href="/">Login here</a>
    </div>
</div>

</body>
</html>
