<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Healthy-One Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 35px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        h1 { color: #4caf50; margin-bottom: 10px; font-size: 24px; }
        p { color: #666; font-size: 14px; margin-bottom: 25px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #4caf50; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #45a049; }
        .links { margin-top: 20px; font-size: 13px; }
        .links a { color: #4caf50; text-decoration: none; }
        .admin-link { margin-top: 30px; display: block; color: #999; text-decoration: none; font-size: 11px; }
    </style>
</head>
<body>

<div class="login-card">
    <h1>Healthy-One</h1>
    <p>Sign in to track your goals</p>
    
    <form action="/login" method="POST">
        <input type="text" name="username" placeholder="Username" required>
        <input type="password" name="password" placeholder="Password" required>
        <button type="submit">Login</button>
    </form>

    <div class="links">
        New here? <a href="/signup_page">Create an account</a>
    </div>

    <a href="/admin_vault" class="admin-link">Admin Access</a>
</div>

</body>
</html>
